# ros2_control controller_manager configuration.
# In ROS2 the ROS1 "joint_state_controller/JointStateController" is replaced by
# the "joint_state_broadcaster/JointStateBroadcaster".
#
# The per-joint PID gains, joint list, home configuration and joint_type for the
# ros_impedance_controller are supplied by the robot-specific config
# (<robot>_description/config/ros_impedance_controller.yaml) and merged into this
# same controller_manager namespace.
controller_manager:
  ros__parameters:
    update_rate: 1000  # Hz

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    ros_impedance_controller:
      type: ros_impedance_controller/Controller

joint_state_broadcaster:
  ros__parameters:
    publish_rate: 1000
