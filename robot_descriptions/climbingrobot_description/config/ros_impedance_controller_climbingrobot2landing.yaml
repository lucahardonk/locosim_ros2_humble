# ros2_control configuration for the climbingrobot2landing variant
# (climbingrobot2 + landing legs/wheels). Loaded by the gazebo_ros2_control
# plugin (see gazebo/gazebo.xacro).

controller_manager:
  ros__parameters:
    update_rate: 1000

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    ros_impedance_controller:
      type: ros_impedance_controller/Controller

joint_state_broadcaster:
  ros__parameters:
    publish_rate: 1000

ros_impedance_controller:
  ros__parameters:
    robot_name: climbingrobot2landing
    pid_discrete_implementation: false
    joints:
      - mountain_wire_pitch_r
      - mountain_wire_roll_r
      - wire_base_prismatic_r
      - wire_base_pitch_r
      - wire_base_roll_r
      - wire_base_yaw_r
      - mountain_wire_pitch_l
      - mountain_wire_roll_l
      - wire_base_prismatic_l
      - wire_base_pitch_l
      - wire_base_roll_l
      - wire_base_yaw_l
      - hip_pitch
      - hip_roll
      - knee
      - hip_yaw_landing_l
      - wheel_joint_l
      - hip_yaw_landing_r
      - wheel_joint_r
    gains:
      mountain_wire_pitch_r: {p: 0.0, i: 0.0, d: 0.0}
      mountain_wire_roll_r:  {p: 0.0, i: 0.0, d: 0.0}
      wire_base_prismatic_r: {p: 0.0, i: 0.0, d: 0.0}
      wire_base_pitch_r:     {p: 0.0, i: 0.0, d: 0.0}
      wire_base_roll_r:      {p: 0.0, i: 0.0, d: 0.0}
      wire_base_yaw_r:       {p: 0.0, i: 0.0, d: 0.0}
      mountain_wire_pitch_l: {p: 0.0, i: 0.0, d: 0.0}
      mountain_wire_roll_l:  {p: 0.0, i: 0.0, d: 0.0}
      wire_base_prismatic_l: {p: 0.0, i: 0.0, d: 0.0}
      wire_base_pitch_l:     {p: 0.0, i: 0.0, d: 0.0}
      wire_base_roll_l:      {p: 0.0, i: 0.0, d: 0.0}
      wire_base_yaw_l:       {p: 0.0, i: 0.0, d: 0.0}
      hip_pitch:             {p: 0.0, i: 0.0, d: 0.0}
      hip_roll:              {p: 0.0, i: 0.0, d: 0.0}
      knee:                  {p: 0.0, i: 0.0, d: 0.0}
      hip_yaw_landing_l:     {p: 0.0, i: 0.0, d: 0.0}
      wheel_joint_l:         {p: 0.0, i: 0.0, d: 0.0}
      hip_yaw_landing_r:     {p: 0.0, i: 0.0, d: 0.0}
      wheel_joint_r:         {p: 0.0, i: 0.0, d: 0.0}
    home:
      mountain_wire_pitch_r: 0.0
      mountain_wire_roll_r:  0.0
      wire_base_prismatic_r: 0.0
      wire_base_pitch_r:     0.0
      wire_base_roll_r:      0.0
      wire_base_yaw_r:       0.0
      mountain_wire_pitch_l: 0.0
      mountain_wire_roll_l:  0.0
      wire_base_prismatic_l: 0.0
      wire_base_pitch_l:     0.0
      wire_base_roll_l:      0.0
      wire_base_yaw_l:       0.0
      hip_pitch:             0.0
      hip_roll:              0.0
      knee:                  0.0
      hip_yaw_landing_l:     0.0
      wheel_joint_l:         0.0
      hip_yaw_landing_r:     0.0
      wheel_joint_r:         0.0
